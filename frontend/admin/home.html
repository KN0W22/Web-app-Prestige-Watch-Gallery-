<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prestige Watch Gallery — Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark:      #1c2535;
      --bg-mid:       #222d3e;
      --bg-nav:       rgba(20, 28, 42, 0.85);
      --blue-accent:  #2e4a7a;
      --blue-bright:  #3d6199;
      --gold:         #c9a84c;
      --gold-light:   #e0c070;
      --text-light:   #e8ecf5;
      --text-muted:   #8a9ab5;
      --border:       rgba(255,255,255,0.1);
      --btn-border:   rgba(200,210,230,0.55);
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      color: var(--text-light);
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      /* layered gradient to replicate dark steel-blue gradient */
      background:
        radial-gradient(ellipse 80% 60% at 30% 60%, rgba(30,50,85,0.7) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 30%, rgba(15,25,45,0.6) 0%, transparent 65%),
        linear-gradient(160deg, #1a2740 0%, #1c2d4a 30%, #1a2535 55%, #151e2e 100%);
    }

    /* subtle grain texture */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      opacity: 0.35;
      pointer-events: none;
    }

    /* subtle floor line at bottom */
    .floor {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 160px;
      background: linear-gradient(to top, rgba(8,14,24,0.55) 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      height: 58px;
      background: var(--bg-nav);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-left, .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeDown 0.6s ease both;
    }

    .nav-link {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-light);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--gold-light); }

    .nav-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .nav-icon:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.25);
    }
    .nav-icon svg { width: 15px; height: 15px; fill: var(--text-light); }

    /* logout dot indicator */
    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      box-shadow: 0 0 6px rgba(76,175,80,0.7);
      flex-shrink: 0;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      align-items: center;
      padding: 58px 0 0;
      overflow: hidden;
    }

    .hero-content {
      position: relative;
      z-index: 3;
      padding: 0 60px;
      max-width: 55%;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    .collection-label {
      font-size: 0.68rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 6vw, 5.2rem);
      font-weight: 700;
      line-height: 1.05;
      color: var(--text-light);
      letter-spacing: -0.01em;
      margin-bottom: 48px;
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 36px;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: all 0.22s;
      border: 1.5px solid var(--btn-border);
      background: rgba(255,255,255,0.06);
      color: var(--text-light);
      backdrop-filter: blur(6px);
      text-decoration: none;
    }
    .btn:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .btn:active { transform: translateY(0); }

    /* ── WATCH IMAGE ── */
    .watch-wrap {
      position: absolute;
      right: -2%;
      bottom: -2%;
      width: 62%;
      max-width: 780px;
      z-index: 2;
      pointer-events: none;
      animation: watchFloat 1.1s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .watch-wrap img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(-30px 30px 60px rgba(0,0,0,0.65)) drop-shadow(-10px 10px 30px rgba(20,60,120,0.35));
    }

    /* glow behind watch */
    .watch-glow {
      position: absolute;
      right: 12%;
      bottom: 10%;
      width: 45%;
      height: 55%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(45,85,160,0.28) 0%, transparent 70%);
      filter: blur(30px);
      z-index: 1;
      pointer-events: none;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(28px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes watchFloat {
      from { opacity:0; transform:translateY(40px) scale(0.96); }
      to   { opacity:1; transform:translateY(0)  scale(1); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .hero-content { max-width: 100%; padding: 0 28px; }
      h1 { font-size: 2.6rem; }
      .watch-wrap {
        position: relative;
        right: auto; bottom: auto;
        width: 90%;
        margin: 0 auto;
      }
      .hero { flex-direction: column; align-items: flex-start; padding-top: 80px; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg"></div>
  <div class="floor"></div>

  <!-- ═══ NAV ═══ -->
  <nav>
    <!-- Left: About -->
    <div class="nav-left">
      <span class="nav-link">About</span>
      <!-- Info icon -->
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10S22 17.523 22 12 17.523 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
        </svg>
      </div>
      <!-- Avatar icon -->
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>
    </div>

    <!-- Right: Log Out -->
    <div class="nav-right">
      <span class="nav-link">Log Out</span>
      <div class="nav-dot"></div>
    </div>
  </nav>

  <!-- ═══ HERO ═══ -->
  <section class="hero">

    <!-- Text content -->
    <div class="hero-content">
      <p class="collection-label">Authentic Collection</p>
      <h1>Prestige Watch<br>Gallery</h1>
      <div class="btn-row">
        <a class="btn" href="add-collection.html">Add Collection</a>
        <button class="btn">Modify Collection</button>
      </div>
    </div>

    <!-- Glow effect behind watch -->
    <div class="watch-glow"></div>

    <!-- Watch image -->
    <div class="watch-wrap">
      <img
        src="https://images.unsplash.com/photo-1594534475808-b18fc33b045e?w=900&auto=format&fit=crop&q=85"
        alt="Luxury blue chronograph watch"
        onerror="this.src='https://images.unsplash.com/photo-1548171915-b4b4f9e51f97?w=900&auto=format&fit=crop&q=85'"
      />
    </div>

  </section>

</body>
</html>
