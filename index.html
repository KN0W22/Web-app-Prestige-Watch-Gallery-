<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prestige Watch Gallery — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep:   #1a2e1a;
      --green-header: #243824;
      --green-panel:  #1e2f1e;
      --green-mid:    #2d4a2d;
      --green-accent: #3a6b3a;
      --green-btn:    #2e6b2e;
      --green-btn-h:  #3a8a3a;
      --gold:         #c9a84c;
      --gold-light:   #e0c070;
      --text-light:   #e8e8e0;
      --text-muted:   #9aaa9a;
      --input-bg:     rgba(255,255,255,0.06);
      --input-border: rgba(255,255,255,0.12);
      --input-focus:  rgba(201,168,76,0.45);
    }

    html, body {
      height: 100%;
      background: var(--green-deep);
      font-family: 'Montserrat', sans-serif;
      color: var(--text-light);
    }

    /* ── HEADER ── */
    header {
      background: var(--green-header);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 14px 40px;
      position: relative;
      z-index: 10;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeDown 0.7s ease both;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--green-deep);
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 18px rgba(201,168,76,0.25);
    }

    /* SVG watch-face inline logo */
    .logo-icon svg { width: 46px; height: 46px; }

    .logo-text {
      text-align: center;
    }
    .logo-text .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--text-light);
      line-height: 1;
      text-transform: uppercase;
    }
    .logo-text .sub {
      font-size: 0.62rem;
      letter-spacing: 0.45em;
      color: var(--gold);
      text-transform: uppercase;
      margin-top: 3px;
      font-weight: 500;
    }

    /* ── MAIN SPLIT ── */
    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 93px);
    }

    /* ── LEFT — hero image ── */
    .hero {
      position: relative;
      overflow: hidden;
      min-height: 520px;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.72) saturate(0.85);
      transition: transform 8s ease;
    }
    .hero:hover .hero-img { transform: scale(1.04); }

    /* gradient overlay */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(160deg, rgba(20,35,20,0.35) 0%, transparent 55%),
        linear-gradient(0deg, rgba(10,20,10,0.72) 0%, transparent 55%);
      pointer-events: none;
    }

    .hero-quote {
      position: absolute;
      bottom: 52px;
      left: 44px;
      right: 44px;
      z-index: 2;
      animation: fadeUp 1s 0.4s ease both;
    }
    .hero-quote p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.25rem, 2.2vw, 1.6rem);
      line-height: 1.55;
      color: #fff;
      text-shadow: 0 2px 16px rgba(0,0,0,0.55);
    }
    .hero-quote p strong {
      font-style: normal;
      font-weight: 600;
      color: var(--gold-light);
    }

    /* Decorative gold line */
    .hero-quote::before {
      content: '';
      display: block;
      width: 48px;
      height: 2px;
      background: var(--gold);
      margin-bottom: 16px;
    }

    /* ── RIGHT — login panel ── */
    .panel {
      background: var(--green-panel);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 64px;
      position: relative;
      overflow: hidden;
    }

    /* decorative circle in bottom-right */
    .panel::after {
      content: '';
      position: absolute;
      bottom: -120px;
      right: -80px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: var(--green-accent);
      opacity: 0.18;
      pointer-events: none;
    }

    .panel-inner {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .panel-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.65;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
    }

    .login-form {
      width: 100%;
    }

    .status-message {
      display: none;
      margin-bottom: 20px;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 0.78rem;
      line-height: 1.5;
      letter-spacing: 0.04em;
      border: 1px solid transparent;
    }

    .status-message.is-visible {
      display: block;
    }

    .status-message.is-error {
      background: rgba(166, 54, 54, 0.16);
      border-color: rgba(224, 124, 124, 0.35);
      color: #ffd8d8;
    }

    .status-message.is-success {
      background: rgba(46, 107, 46, 0.2);
      border-color: rgba(201, 168, 76, 0.35);
      color: #f1ebd1;
    }

    /* Inputs */
    .field {
      position: relative;
      margin-bottom: 20px;
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 50px;
      padding: 16px 26px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      color: var(--text-light);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      letter-spacing: 0.04em;
    }
    .field input::placeholder { color: var(--text-muted); }
    .field input:focus {
      border-color: rgba(201,168,76,0.55);
      box-shadow: 0 0 0 3px var(--input-focus);
      background: rgba(255,255,255,0.09);
    }

    /* forgot */
    .forgot {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 28px;
    }
    .forgot a {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-light);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .forgot a:hover { color: var(--gold-light); }

    /* Login button */
    .btn-login {
      width: 100%;
      background: var(--green-btn);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 17px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s, box-shadow 0.25s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(46,107,46,0.45);
    }
    .btn-login:hover {
      background: var(--green-btn-h);
      box-shadow: 0 6px 28px rgba(46,107,46,0.65);
      transform: translateY(-1px);
    }
    .btn-login:active { transform: translateY(0); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--input-border);
    }

    /* Social buttons */
    .btn-social {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--input-border);
      border-radius: 50px;
      padding: 14px 26px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      color: var(--text-light);
      letter-spacing: 0.05em;
      transition: background 0.22s, border-color 0.22s, transform 0.15s;
      margin-bottom: 14px;
    }
    .btn-social:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.22);
      transform: translateY(-1px);
    }
    .btn-social:last-child { margin-bottom: 0; }

    .btn-social .s-icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-social .s-label { flex: 1; text-align: center; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-18px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(22px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 800px) {
      .page { grid-template-columns: 1fr; }
      .hero { min-height: 340px; }
      .panel { padding: 48px 32px; }
    }
  </style>
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header>
    <div class="logo-wrap">
      <div class="logo-icon">
        <!-- Inline watch-face SVG -->
        <svg viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="23" cy="23" r="21" stroke="#c9a84c" stroke-width="1.5"/>
          <circle cx="23" cy="23" r="17" fill="#1a2e1a" stroke="#c9a84c" stroke-width="0.8"/>
          <!-- Roman numerals markers -->
          <line x1="23" y1="7"  x2="23" y2="10" stroke="#c9a84c" stroke-width="1.2"/>
          <line x1="23" y1="36" x2="23" y2="39" stroke="#c9a84c" stroke-width="1.2"/>
          <line x1="7"  y1="23" x2="10" y2="23" stroke="#c9a84c" stroke-width="1.2"/>
          <line x1="36" y1="23" x2="39" y2="23" stroke="#c9a84c" stroke-width="1.2"/>
          <!-- Hour hand -->
          <line x1="23" y1="23" x2="23" y2="13" stroke="#e8e8e0" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Minute hand -->
          <line x1="23" y1="23" x2="30" y2="20" stroke="#e8e8e0" stroke-width="1" stroke-linecap="round"/>
          <!-- Center dot -->
          <circle cx="23" cy="23" r="1.8" fill="#c9a84c"/>
          <!-- Crown -->
          <rect x="38" y="21" width="5" height="4" rx="1" fill="#c9a84c"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="brand">Prestige</div>
        <div class="sub">Watch Gallery</div>
      </div>
    </div>
  </header>

  <!-- ═══ MAIN ═══ -->
  <main class="page">

    <!-- LEFT: hero -->
    <div class="hero">
      <!-- Using a high-quality Unsplash watch image -->
      <img
        class="hero-img"
        src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=900&auto=format&fit=crop&q=80"
        alt="Luxury chronograph watch on rock"
      />
      <div class="hero-quote">
        <p>
          "<strong>We curate</strong> the world's finest<br>
          timepieces for those who<br>
          appreciate true luxury and<br>
          timeless design."
        </p>
      </div>
    </div>

    <!-- RIGHT: login panel -->
    <div class="panel">
      <div class="panel-inner">
        <p class="panel-tagline">
          Discover an exclusive collection where the art of horology meets modern prestige.
        </p>

        <div class="status-message" id="statusMessage" aria-live="polite"></div>

        <form class="login-form" action="backend/authentication/login.php" method="POST">
          <div class="field">
            <input
              id="email"
              name="email"
              type="email"
              placeholder="Email"
              autocomplete="email"
              required
            />
          </div>

          <div class="field">
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Password"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="forgot"><a href="#">Forget password?</a></div>

          <button class="btn-login" type="submit">Login</button>
        </form>

        <div class="divider">or</div>

        <!-- Google -->
        <button class="btn-social" type="button">
          <span class="s-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </span>
          <span class="s-label">Login with Google</span>
        </button>

        <!-- Facebook -->
        <button class="btn-social" type="button">
          <span class="s-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.269h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z" fill="#1877F2"/>
            </svg>
          </span>
          <span class="s-label">Login with Facebook</span>
        </button>

      </div>
    </div>

  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const statusMessage = document.getElementById('statusMessage');
    const emailInput = document.getElementById('email');

    const savedEmail = params.get('email');
    if (savedEmail && emailInput) {
      emailInput.value = savedEmail;
    }

    let message = '';
    let messageType = '';

    if (params.get('error') === 'invalid') {
      message = 'Invalid email or password. Please try again.';
      messageType = 'is-error';
    } else if (params.get('error') === 'missing') {
      message = 'Enter both your email and password before logging in.';
      messageType = 'is-error';
    } else if (params.get('login') === 'success') {
      message = 'Login successful. Your session is now active.';
      messageType = 'is-success';
    }

    if (message) {
      statusMessage.textContent = message;
      statusMessage.classList.add('is-visible', messageType);
    }
  </script>

</body>
</html>
